<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejoindre mon serveur Discord</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #1a1c24;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: #23273a;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 90%;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 25px;
            color: #f1f2f6;
            line-height: 1.4;
        }

        .btn-discord {
            display: inline-block;
            text-decoration: none;
            background: #5865F2;
            color: white;
            font-weight: bold;
            font-size: 18px;
            padding: 15px 35px;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
            margin-bottom: 30px;
            width: 100%;
        }

        .btn-discord:hover {
            background: #4752C4;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.6);
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
        }

        .youtube-section {
            font-size: 16px;
            color: #b9bbbe;
        }

        .youtube-link {
            display: inline-block;
            margin-top: 10px;
            color: #FF0000;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: color 0.2s ease;
        }

        .youtube-link:hover {
            color: #ff3333;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Lien pour rejoindre mon serveur Discord :</h1>
        <a href="https://discord.gg/cpBwvUMeY" target="_blank" class="btn-discord">
            Rejoindre le Discord
        </a>

        <div class="divider"></div>

        <div class="youtube-section">
            <p>Ma chaîne YouTube :</p>
            <a href="https://www.youtube.com/@leprodubrawl" target="_blank" class="youtube-link">
                www.youtube.com/@leprodubrawl
            </a>
        </div>
    </div>

</body>
</html>
